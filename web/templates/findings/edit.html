{% extends "base/base.html" %}
{% block title %}Edit Finding — PenTools{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
<div class="mb-5 flex items-center gap-2 text-xs text-gray-500">
  <a href="{% url 'finding_list' %}" class="hover:text-white">Findings</a>
  <span>/</span>
  <a href="{% url 'finding_detail' finding.pk %}" class="hover:text-white">{{ finding.title|truncatechars:40 }}</a>
  <span>/</span><span class="text-gray-300">Edit</span>
</div>
<div class="bg-surface-card border border-surface-border rounded p-6">
  <h2 class="text-base font-bold text-white mb-5">Edit Finding</h2>
  <form method="post">
    {% csrf_token %}
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="col-span-2">
        <label class="block text-xs text-gray-400 mb-1">Title</label>
        <input name="title" value="{{ finding.title }}" required
               class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-accent">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Severity</label>
        <select name="severity" class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm text-gray-300">
          {% for val, label in severity_choices %}
          <option value="{{ val }}" {% if finding.severity == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">URL</label>
        <input name="url" value="{{ finding.url }}"
               class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm font-mono text-gray-300 focus:outline-none focus:border-accent">
      </div>
      <div class="col-span-2">
        <label class="block text-xs text-gray-400 mb-1">Description</label>
        <textarea name="description" rows="4"
                  class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm text-gray-300 resize-y focus:outline-none focus:border-accent">{{ finding.description }}</textarea>
      </div>
      <div class="col-span-2">
        <label class="block text-xs text-gray-400 mb-1">Evidence</label>
        <textarea name="evidence" rows="4"
                  class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-xs font-mono text-gray-400 resize-y focus:outline-none focus:border-accent">{{ finding.evidence }}</textarea>
      </div>
      <div class="col-span-2">
        <label class="block text-xs text-gray-400 mb-1">Remediation</label>
        <textarea name="remediation" rows="3"
                  class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm text-gray-300 resize-y focus:outline-none focus:border-accent">{{ finding.remediation }}</textarea>
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">CVSS Score</label>
        <input name="cvss_score" type="number" step="0.1" min="0" max="10" value="{{ finding.cvss_score|default:'' }}"
               class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">CVSS Vector</label>
        <input name="cvss_vector" value="{{ finding.cvss_vector }}"
               class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-xs font-mono text-gray-400 focus:outline-none focus:border-accent">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">CVE ID</label>
        <input name="cve_id" value="{{ finding.cve_id }}"
               class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm font-mono text-gray-300 focus:outline-none focus:border-accent">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">CWE ID</label>
        <input name="cwe_id" value="{{ finding.cwe_id }}" list="cwe-list"
               class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm font-mono text-gray-300 focus:outline-none focus:border-accent">
        <datalist id="cwe-list">
          {% for cid, clabel in cwe_suggestions %}
          <option value="{{ cid }}" label="{{ clabel }}">
          {% endfor %}
        </datalist>
      </div>
      <div class="col-span-2">
        <label class="block text-xs text-gray-400 mb-1">Notes</label>
        <textarea name="notes" rows="2"
                  class="w-full bg-surface border border-surface-border rounded px-3 py-2 text-sm text-gray-400 resize-y focus:outline-none focus:border-accent">{{ finding.notes }}</textarea>
      </div>
    </div>
    <div class="flex gap-3">
      <button type="submit" class="px-5 py-2 bg-accent text-white rounded text-sm font-medium hover:bg-accent-hover">Save Changes</button>
      <a href="{% url 'finding_detail' finding.pk %}" class="px-5 py-2 border border-surface-border text-gray-400 rounded text-sm">Cancel</a>
    </div>
  </form>
</div>
</div>
{% endblock %}
